<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./../../styles/configuration-style.css" />
    <link rel="stylesheet" href="./../../styles/animations.css" />
    <link rel="stylesheet" href="./../styles/style.css" />
    <script src="/./components/javascript/header.js" type="text/javascript" defer></script>
    <script src="/./components/javascript/footer.js" type="text/javascript" defer></script>
    <!-- <script src="./problem-chooser.js" defer type="module"></script>!-->
    <title>Resolução -Beecrowd</title>
  </head>
  <body>
    <header-component></header-component>
    <div class="content-wrapper">
      <div class="form-content-container">
        <h1>Resolução de exercícios - Beecrowd</h1>
        <div class="problem-container">
          <label for="problem">⚙️Problema: </label>
          <div class="custom-problem-select">
            <select name="problem" id="problem">
              <option value="" disabled selected>Selecione o problema.</option>
              <option value="1000">1000</option>
              <option value="1001">1001</option>
              <option value="1002">1002</option>
              <option value="1003">1003</option>
              <option value="1004">1004</option>
              <option value="1005">1005</option>
            </select>
            <span class="custom-arrow"></span>
          </div>
        </div>

        <div class="input-container">
          <label for="">✍🏻Entradas:</label>
          <textarea
            class="input"
            id="input"
            placeholder="Dados necessários para a resolução do problema, separados por linha."
          ></textarea>
        </div>

        <button type="button" class="solve" id="solve">Resolver</button>
      </div>

      <footer-component></footer-component>
    </div>
  </body>
</html>
